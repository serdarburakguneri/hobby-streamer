environment: development
service: streaming-api

log:
  level: debug
  format: text

server:
  port: "8080"
  read_timeout: "15s"
  write_timeout: "15s"
  idle_timeout: "60s"

features:
  enable_circuit_breaker: true
  enable_retry: true
  enable_caching: true
  enable_metrics: false
  enable_tracing: false

circuit_breaker:
  threshold: 5
  timeout: "30s"

retry:
  max_attempts: 3
  base_delay: "100ms"
  max_delay: "5s"

cache:
  ttl: "30m"

components:
  redis:
    host: "redis"
    port: 6379
    db: 0
    password: ""

  keycloak:
    url: "https://keycloak:8443"
    realm: "hobby"
    client_id: "streaming-api"

  asset_manager:
    url: "http://asset-manager:8080"
    timeout: "30s"
    retry_count: 3 