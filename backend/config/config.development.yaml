environment: development
service: shared

log:
  level: debug
  format: text

server:
  port: "8080"
  read_timeout: "15s"
  write_timeout: "15s"
  idle_timeout: "60s"

aws:
  region: "us-east-1"
  endpoint: "http://localstack:4566"
  force_path_style: true

sqs:
  transcoder_queue_url: "http://localstack:4566/000000000000/transcoder-jobs"
  analyze_queue_url: "http://localstack:4566/000000000000/analyze-completed"
  hls_queue_url: "http://localstack:4566/000000000000/hls-completed"
  dash_queue_url: "http://localstack:4566/000000000000/dash-completed"

s3:
  raw_storage_bucket: "raw-storage"
  transcoded_storage_bucket: "transcoded-storage"
  thumbnails_storage_bucket: "thumbnails-storage"

cdn:
  hls_prefix: "http://localhost:8083/hls-storage"
  dash_prefix: "http://localhost:8083/dash-storage"
  thumbnails_prefix: "http://localhost:4566/thumbnails-storage"

neo4j:
  uri: "bolt://neo4j:7687"
  username: "neo4j"
  password: "password"

redis:
  host: "redis"
  port: 6379
  db: 0

keycloak:
  url: "https://keycloak:8443"
  realm: "hobby"
  client_id: "asset-manager"

lambda:
  delete_files_endpoint: "http://localstack:4566/2015-03-31/functions/delete-files/invocations"
  update_cdn_prefix_endpoint: "http://localstack:4566/2015-03-31/functions/update-cdn-prefix/invocations"

features:
  enable_circuit_breaker: true
  enable_retry: true
  enable_caching: true
  enable_metrics: false
  enable_tracing: false

circuit_breaker:
  threshold: 5
  timeout: "30s"

retry:
  max_attempts: 3
  base_delay: "100ms"
  max_delay: "5s"

cache:
  ttl: "30m" 