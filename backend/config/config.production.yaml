environment: production
service: shared

log:
  level: info
  format: json

server:
  port: "8080"
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"

aws:
  region: "us-east-1"
  force_path_style: false

sqs:
  transcoder_queue_url: "https://sqs.us-east-1.amazonaws.com/123456789012/transcoder-jobs"
  analyze_queue_url: "https://sqs.us-east-1.amazonaws.com/123456789012/analyze-completed"
  hls_queue_url: "https://sqs.us-east-1.amazonaws.com/123456789012/hls-completed"
  dash_queue_url: "https://sqs.us-east-1.amazonaws.com/123456789012/dash-completed"

s3:
  raw_storage_bucket: "hobby-streamer-raw-storage"
  transcoded_storage_bucket: "hobby-streamer-transcoded-storage"
  thumbnails_storage_bucket: "hobby-streamer-thumbnails-storage"

cdn:
  hls_prefix: "https://d1234567890.cloudfront.net/hls-storage"
  dash_prefix: "https://d1234567890.cloudfront.net/dash-storage"
  thumbnails_prefix: "https://d1234567890.cloudfront.net/thumbnails-storage"

neo4j:
  uri: "bolt://neo4j-cluster.example.com:7687"
  username: "neo4j"

redis:
  host: "redis-cluster.example.com"
  port: 6379
  db: 0

keycloak:
  url: "https://keycloak.example.com"
  realm: "hobby"
  client_id: "asset-manager"

lambda:
  delete_files_endpoint: "https://lambda.us-east-1.amazonaws.com/2015-03-31/functions/delete-files/invocations"
  update_cdn_prefix_endpoint: "https://lambda.us-east-1.amazonaws.com/2015-03-31/functions/update-cdn-prefix/invocations"

features:
  enable_circuit_breaker: true
  enable_retry: true
  enable_caching: true
  enable_metrics: true
  enable_tracing: true

circuit_breaker:
  threshold: 10
  timeout: "60s"

retry:
  max_attempts: 5
  base_delay: "200ms"
  max_delay: "10s"

cache:
  ttl: "1h" 