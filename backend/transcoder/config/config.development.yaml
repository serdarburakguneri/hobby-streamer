environment: development
service: transcoder

log:
  level: debug
  format: text

server:
  port: "8080"
  read_timeout: "15s"
  write_timeout: "15s"
  idle_timeout: "60s"

features:
  enable_circuit_breaker: true
  enable_retry: true
  enable_caching: true
  enable_metrics: false
  enable_tracing: false

circuit_breaker:
  threshold: 5
  timeout: "30s"

retry:
  max_attempts: 3
  base_delay: "100ms"
  max_delay: "5s"

cache:
  ttl: "30m"

components:
  sqs:
    hls_queue_url: "http://localstack:4566/000000000000/hls-jobs"
    dash_queue_url: "http://localstack:4566/000000000000/dash-jobs"
    analyze_queue_url: "http://localstack:4566/000000000000/analyze-jobs"
    analyze_completed_queue_url: "http://localstack:4566/000000000000/analyze-completed"
    hls_completed_queue_url: "http://localstack:4566/000000000000/hls-completed"
    dash_completed_queue_url: "http://localstack:4566/000000000000/dash-completed"
    region: "us-east-1"
    endpoint: "http://localstack:4566"
    force_path_style: true 