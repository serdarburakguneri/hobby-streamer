services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"  # Main LocalStack edge port
      - "8000:8000"  # DynamoDB (optional, for direct access)
    environment:
      - SERVICES=dynamodb,sqs,s3,lambda
      - PERSISTENCE=0
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KEYCLOAK_IMPORT=/opt/keycloak/data/import/hobby-realm.json
    ports:
      - "9090:8080"  # Keycloak web UI and API (mapped to 9090 to avoid conflict)
      - "8443:8443"  # Keycloak HTTPS (optional)
    volumes:
      - ./keycloak-config/hobby-realm.json:/opt/keycloak/data/import/hobby-realm.json
    depends_on:
      - localstack

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=hobby
      - KEYCLOAK_CLIENT_ID=asset-manager
    depends_on:
      - localstack
      - keycloak

  asset-manager:
    build:
      context: ./backend
      dockerfile: asset-manager/Dockerfile
    ports:
      - "8082:8080"
    environment:
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=hobby
      - KEYCLOAK_CLIENT_ID=asset-manager
    depends_on:
      - localstack
      - keycloak
      - auth-service

  transcoder:
    build:
      context: ./backend
      dockerfile: transcoder/Dockerfile
    environment:
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/transcoder-jobs
    depends_on:
      - localstack 