services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - hobby-streamer

  kibana:
    image: docker.elastic.co/kibana/kibana:9.0.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - hobby-streamer

  fluentd:
    build:
      context: ./local/fluentd
      dockerfile: Dockerfile
    container_name: fluentd
    volumes:
      - ./local/fluentd/fluent.conf:/fluentd/etc/fluent.conf
      - ./local/fluentd/log:/fluentd/log
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "fluentd"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      hobby-streamer:
        ipv4_address: 172.30.0.10
        aliases:
          - fluentd

  localstack:
    image: localstack/localstack:latest
    env_file:
      - .env
    ports:
      - "4566:4566"
      - "8000:8000"
    environment:
      - SERVICES=dynamodb,sqs,s3,lambda,apigateway
      - PERSISTENCE=0
      - ENABLE_CORS_ALLOW_ALL=1
      - CORS_ALLOW_ORIGINS=http://localhost:8081,http://localhost:3000,http://localhost:8080
      - S3_CORS_ALLOW_ORIGINS=http://localhost:8081,http://localhost:3000,http://localhost:8080
      - S3_CORS_ALLOW_METHODS=GET,PUT,POST,DELETE,HEAD,OPTIONS
      - S3_CORS_ALLOW_HEADERS=*
      - S3_SKIP_SIGNATURE_VALIDATION=1
      - S3_SKIP_OWNERSHIP_VALIDATION=1
      - S3_SKIP_ACL_VALIDATION=1
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - hobby-streamer

  neo4j:
    image: neo4j:5.15-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - hobby-streamer

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.6
    command: start-dev --https-port=8443 --https-certificate-file=/opt/keycloak/certs/cert.pem --https-certificate-key-file=/opt/keycloak/certs/key.pem
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KEYCLOAK_IMPORT=/opt/keycloak/data/import/hobby-realm.json
    ports:
      - "9090:8080"
      - "8443:8443"
    volumes:
      - ./local/keycloak-config/hobby-realm.json:/opt/keycloak/data/import/hobby-realm.json
      - ./local/keycloak-certs:/opt/keycloak/certs
    depends_on:
      - localstack
    networks:
      - hobby-streamer

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - KEYCLOAK_URL=https://keycloak:8443
      - KEYCLOAK_REALM=hobby
      - KEYCLOAK_CLIENT_ID=asset-manager
      - AWS_REGION=${AWS_REGION}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    depends_on:
      - fluentd
      - keycloak
    logging:
      driver: fluentd
      options:
        fluentd-address: 172.30.0.10:24224
    networks:
      - hobby-streamer

  asset-manager:
    build:
      context: ./backend
      dockerfile: asset-manager/Dockerfile
    ports:
      - "8082:8080"
    env_file:
      - .env
    environment:
      - KEYCLOAK_URL=https://keycloak:8443
      - KEYCLOAK_REALM=hobby
      - KEYCLOAK_CLIENT_ID=asset-manager
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - TRANSCODER_QUEUE_URL=${TRANSCODER_QUEUE_URL}
      - ANALYZE_QUEUE_URL=${ANALYZE_QUEUE_URL}
      - AWS_ENDPOINT=${LOCALSTACK_ENDPOINT}
      - DELETE_ASSET_FILES_LAMBDA_ENDPOINT=${DELETE_FILES_LAMBDA_ENDPOINT}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    depends_on:
      - fluentd
      - keycloak
      - neo4j
    logging:
      driver: fluentd
      options:
        fluentd-address: 172.30.0.10:24224
    networks:
      - hobby-streamer

  transcoder:
    build:
      context: ./backend
      dockerfile: transcoder/Dockerfile
    env_file:
      - .env
    environment:
      - SQS_QUEUE_URL=${TRANSCODER_QUEUE_URL}
      - TRANSCODER_QUEUE_URL=${TRANSCODER_QUEUE_URL}
      - ANALYZE_QUEUE_URL=${ANALYZE_QUEUE_URL}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_ENDPOINT=${LOCALSTACK_ENDPOINT}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    depends_on:
      - fluentd
    logging:
      driver: fluentd
      options:
       fluentd-address: 172.30.0.10:24224
    networks:
      - hobby-streamer

volumes:
  esdata:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:

networks:
  hobby-streamer:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16