# /local/fluentd/fluent.conf

########################################################
# 1) INPUT: accept forwards from Docker logging driver
########################################################
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

########################################################
# 2) PARSE incoming JSON logs
########################################################
<filter **>
  @type parser
  key_name log
  <parse>
    @type json
    time_key time
    time_format %Y-%m-%dT%H:%M:%S.%L%z
    time_type string
  </parse>
</filter>

########################################################
# 3) TRANSFORM: flatten, tag and timestamp
########################################################
<filter **>
  @type record_transformer
  enable_ruby true

  <record>
    # use the Docker-forward event time as @timestamp
    @timestamp    ${Time.at(time).iso8601}

    # use the service field from the log, or fall back to container name
    service_name  ${record["service"] || tag}

    # pull in any app-emitted fields
    level         ${record["level"]       || ""}
    msg           ${record["msg"]         || ""}
    method        ${record["method"]      || ""}
    path          ${record["path"]        || ""}
    status_code   ${record["status_code"] || ""}
    duration_ms   ${record["duration_ms"] || ""}
    request_id    ${record["request_id"]  || ""}
    tracking_id   ${record["tracking_id"] || ""}
    user_id       ${record["user_id"]     || ""}
    username      ${record["username"]    || ""}
    remote_addr   ${record["remote_addr"] || ""}
    user_agent    ${record["user_agent"]  || ""}

    # keep the raw log in case you need it
    original_log  ${record["log"]         || ""}
  </record>
</filter>

########################################################
# 4) OUTPUT: ship into Elasticsearch
########################################################
<match **>
  @type elasticsearch
  host              elasticsearch    # or your ES host/IP
  port              9200

  # ─── Logstash-style rolling indices ──────────────────────────────────────
  logstash_format   true            # enable date-suffix mode
  logstash_prefix   docker-logs     # base index name
  logstash_dateformat %Y.%m.%d      # FOUR-digit year!
  include_timestamp true            # populate @timestamp for each doc

  <buffer>
    @type              memory
    flush_interval     5s
    chunk_limit_size   2M
    queue_limit_length 8
    retry_forever      true
  </buffer>
</match>