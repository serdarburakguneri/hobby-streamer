worker_processes 1;
events { worker_connections 1024; }
http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 8083;
        server_name _;

        # Proxy HLS files to LocalStack S3
        location /hls-storage/ {
            proxy_pass http://localstack:4566/hls-storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range,Origin,Accept-Encoding";
            add_header Access-Control-Expose-Headers "Content-Length,Content-Range";
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
        }

        # Proxy DASH files to LocalStack S3
        location /dash-storage/ {
            proxy_pass http://localstack:4566/dash-storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range,Origin,Accept-Encoding";
            add_header Access-Control-Expose-Headers "Content-Length,Content-Range";
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
        }

        # Set correct MIME type for .m3u8
        location ~* \.m3u8$ {
            proxy_pass http://localstack:4566;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Content-Type "application/vnd.apple.mpegurl" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range,Origin,Accept-Encoding";
            add_header Access-Control-Expose-Headers "Content-Length,Content-Range";
        }

        # Set correct MIME type for .ts
        location ~* \.ts$ {
            proxy_pass http://localstack:4566;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Content-Type "video/MP2T" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range,Origin,Accept-Encoding";
            add_header Access-Control-Expose-Headers "Content-Length,Content-Range";
        }

        # Set correct MIME type for .mpd
        location ~* \.mpd$ {
            proxy_pass http://localstack:4566;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Content-Type "application/dash+xml" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range,Origin,Accept-Encoding";
            add_header Access-Control-Expose-Headers "Content-Length,Content-Range";
        }

        # Set correct MIME type for .m4s
        location ~* \.m4s$ {
            proxy_pass http://localstack:4566;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Content-Type "video/mp4" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range,Origin,Accept-Encoding";
            add_header Access-Control-Expose-Headers "Content-Length,Content-Range";
        }
    }
} 